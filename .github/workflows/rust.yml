name: Rust CI & Release

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Etapa 1: Testes e Verificações
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt --check

    - name: Lint with clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test --verbose

  # Etapa 2: Build Final (só roda se os testes passarem)
  build:
    name: Build Release for ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: blur-linux
            asset_name: blur
          - os: windows-latest
            artifact_name: blur-windows
            asset_name: blur.exe
          - os: macos-latest
            artifact_name: blur-macos
            asset_name: blur

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build release
      run: cargo build --release --verbose

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/release/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: blur-linux
          path: linux
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: blur-windows
          path: windows
      - name: Download MacOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: blur-macos
          path: macos
      - name: Prepare assets
        run: |
          mv linux/blur blur-linux
          mv windows/blur.exe blur-windows.exe
          mv macos/blur blur-macos
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blur-linux
            blur-windows.exe
            blur-macos
          generate_release_notes: true
